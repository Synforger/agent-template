# agent-template Taskfile
# https://taskfile.dev
#
# 派生エージェント立ち上げ + base 整合性検査の task 集
version: '3'

tasks:
  default:
    desc: 利用可能タスク一覧
    cmds:
      - task --list

  init:
    desc: 派生エージェント repo を新規立ち上げ (= AGENT_DIR=<path> 必須)
    cmds:
      - bash .tooling/init-new-agent.sh "${AGENT_DIR:?set AGENT_DIR=/path/to/new-agent}"

  ci:
    desc: Guard-independent quality gates — same entry point locally and in CI
    cmds:
      - bash .tooling/local-ci/docs-check.sh
      - bash .tooling/local-ci/staledocs-check.sh

  publish:check:
    desc: Pre-publication gate for flipping a repo private -> public (full-history audits + OSS surface checks)
    cmds:
      - bash .tooling/local-ci/publish-check.sh

  lint:
    desc: template リポ自体の lint (= docs + anon)
    cmds:
      - bash "$HOME/.git-hooks/scanners/anon-scan.sh"
      - bash .tooling/local-ci/docs-check.sh

  anon:
    desc: 禁止語彙 scan (= pre-commit と同じ)
    cmds:
      - bash "$HOME/.git-hooks/scanners/anon-scan.sh"

  audit:deep:
    desc: Deep anon audit across 11 sources (needs guard-dispatcher armed on this machine)
    cmds:
      - bash "$HOME/.git-hooks/scanners/anon-audit-deep.sh"


  docs:check:
    desc: Verify template docs conventions (task names / tree diagrams / conflict markers vs reality)
    cmds:
      - bash .tooling/local-ci/docs-check.sh

  install-hooks:
    desc: git hooks install (= .githooks/pre-commit)
    cmds:
      - git config core.hooksPath .githooks
      - echo "git hooks installed (= .githooks/pre-commit)"
