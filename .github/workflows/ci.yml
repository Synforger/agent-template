name: CI

# Thin trigger for the local gate suite — checks live in .tooling/ and
# run offline; this only re-runs `task ci` on pull requests so external
# contributors get a status check. Visibility-guarded: free on public
# repositories, refuses to run on private ones (never consumes minute
# quota).

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gates:
    if: ${{ !github.event.repository.private }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # staledocs trailer acks resolve against history; a shallow clone blinds the coherence gate
      - name: Install go-task
        run: sudo sh -c "$(curl --location https://taskfile.dev/install.sh)" -- -d -b /usr/local/bin
      - name: Run the local gate suite
        run: task ci
